services:
  mongodb:
    image: mongo:latest
    container_name: astro_db
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - astro-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: astro_backend
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      - MONGO_URI=mongodb://mongodb:27017/Astro
      - PORT=3000
    networks:
      - astro-network

  frontend:
    build:
      context: ./frontend/web
      dockerfile: Dockerfile.dev
    container_name: astro_frontend
    ports:
      - "3001:3001"
    volumes:
      - ./frontend/web:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
      - VITE_API_BASE_URL=http://localhost:3000
    networks:
      - astro-network
    depends_on:
      - backend

networks:
  astro-network:
    driver: bridge

volumes:
  mongo_data: {}