version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: astro_db
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: astro_backend
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      - mongodb
    environment:
      - MONGO_URI=mongodb://mongodb:27017/astro_db
      - PORT=3000
    dns:
      - 8.8.8.8

  frontend:
    build:
      context: ./frontend/web
      dockerfile: Dockerfile.dev
    container_name: astro_frontend
    ports:
      - "3001:3001"
    volumes:
      - ./frontend/web:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - backend

volumes:
  mongo_data: {}