services:
  mongodb:
    image: mongo:latest
    container_name: astro_db
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build:
      # Change this to point exactly where your backend Dockerfile is
      context: ./backend 
      dockerfile: Dockerfile.dev
    container_name: astro_backend
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      - mongodb
    environment:
      - MONGO_URI=mongodb://mongodb:27017/astro_db
      - PORT=3000

  frontend:
    build:
      # UPDATE THIS: Point to the 'web' folder inside 'frontend'
      context: ./frontend/web
      dockerfile: Dockerfile.dev
    container_name: astro_frontend
    ports:
      - "3001:3001"
    volumes:
      # UPDATE THIS: Ensure the volume also points to the 'web' folder
      - ./frontend/web:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - backend

volumes:
  mongo_data:s