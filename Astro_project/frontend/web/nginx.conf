# --- PROYECTO ASTRO ---

# 1. Redirección forzosa a HTTPS (Astro)
server {
    listen 80;
    server_name astro.dam.inspedralbes.cat;
    return 301 https://$host$request_uri;
}

# 2. Servidor Principal ASTRO (HTTPS)
server {
    listen 443 ssl;
    server_name astro.dam.inspedralbes.cat;

    client_max_body_size 50M;

    ssl_certificate /etc/letsencrypt/live/astro.dam.inspedralbes.cat/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/astro.dam.inspedralbes.cat/privkey.pem;

    add_header Content-Security-Policy "default-src 'self' https://astro.dam.inspedralbes.cat; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://astro.dam.inspedralbes.cat; font-src 'self' data: https://fonts.gstatic.com https://astro.dam.inspedralbes.cat; img-src 'self' data: https://astro.dam.inspedralbes.cat; connect-src 'self' ws: wss: https://astro.dam.inspedralbes.cat;";
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html; 
    }

    location /api/ {
        proxy_pass http://backend:3000; 
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    location /ws {  
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
    }
}

# --- PROYECTO PI (NUEVO) ---

# 3. Redirección HTTP a HTTPS (Pi)
server {
    listen 80;
    server_name incorporacio-pi.dam.inspedralbes.cat;
    return 301 https://$host$request_uri;
}

# 4. Proxy hacia el contenedor de PI (HTTPS)
server {
    listen 443 ssl;
    server_name incorporacio-pi.dam.inspedralbes.cat;

    # Certificados de Pi (Asegúrate de que existan en la ruta de volúmenes de Astro)
    ssl_certificate /etc/letsencrypt/live/incorporacio-pi.dam.inspedralbes.cat/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/incorporacio-pi.dam.inspedralbes.cat/privkey.pem;

    location / {
        # '172.17.0.1' es normalmente la IP del host desde dentro de Docker.
        # Si no funciona, usa la IP pública de tu servidor.
        proxy_pass http://172.17.0.1:8080; 
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Soporte para WebSockets y Socket.io de Pi
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}       