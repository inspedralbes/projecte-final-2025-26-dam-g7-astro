server {
    # Escuchamos por el puerto 80 (HTTP estándar)
    listen 80;
    
    # Responder a tu IP o dominio
    server_name astro.dam.inspedralbes.cat; 

    client_max_body_size 50M;

    # --- CONFIGURACIÓN DE SEGURIDAD (CSP) ---
    # Hemos añadido 'data:' en font-src y corregido los permisos de conexión
    add_header Content-Security-Policy "default-src 'self' http://localhost:* http://astro.dam.inspedralbes.cat; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com http://astro.dam.inspedralbes.cat; font-src 'self' data: https://fonts.gstatic.com http://astro.dam.inspedralbes.cat; img-src 'self' data: http://localhost:* http://astro.dam.inspedralbes.cat; connect-src 'self' ws: wss: http://localhost:* http://astro.dam.inspedralbes.cat;";

    # Cabeceras adicionales de seguridad recomendadas
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";

    # 1. FRONTEND: Servimos la SPA de Vue/Vite/Astro
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        # Importante para que las rutas de Vue/Astro no den 404 al recargar
        try_files $uri $uri/ /index.html; 
    }

    # 2. BACKEND API: Redirigimos al contenedor del backend de Node.js
    location /api/ {
        proxy_pass http://backend:3000; 
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 300s; 
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
    }
    
    # 3. WEBSOCKETS: Configuración para la conexión en tiempo real
    location /ws {  
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # Páginas de error genéricas
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}