# 1. Redirección forzosa a HTTPS
server {
    listen 80;
    server_name astro.dam.inspedralbes.cat;
    return 301 https://$host$request_uri;
}

# 2. Servidor Principal (HTTPS)
server {
    listen 443 ssl;
    server_name astro.dam.inspedralbes.cat;

    client_max_body_size 50M;

    # --- RUTAS DE LOS CERTIFICADOS (Importante: deben coincidir con tu volumen de Docker) ---
    ssl_certificate /etc/letsencrypt/live/astro.dam.inspedralbes.cat/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/astro.dam.inspedralbes.cat/privkey.pem;

    # --- CONFIGURACIÓN DE SEGURIDAD (CSP CORREGIDA) ---
    # He cambiado los http:// por https:// para evitar errores de "Mixed Content"
    add_header Content-Security-Policy "default-src 'self' https://astro.dam.inspedralbes.cat; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://astro.dam.inspedralbes.cat; font-src 'self' data: https://fonts.gstatic.com https://astro.dam.inspedralbes.cat; img-src 'self' data: https://astro.dam.inspedralbes.cat; connect-src 'self' ws: wss: https://astro.dam.inspedralbes.cat;";

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";

    # 1. FRONTEND
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html; 
    }

    # 2. BACKEND API
    location /api/ {
        proxy_pass http://backend:3000; 
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 300s; 
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
    }
    
    # 3. WEBSOCKETS (Habilitando wss://)
    location /ws {  
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}