server {
    # Escuchamos solo por el puerto 80 (HTTP estándar)
    listen 80;
    
    # El guion bajo es un comodín. Nginx responderá a tu IP pública directamente.
    server_name _; 

    client_max_body_size 50M;

    # --- NUEVA LÍNEA PARA FIX DE FUENTES ---
    # Permite: archivos propios, Google Fonts y fuentes base64 (data:)
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data:; connect-src 'self' ws: wss:;";
    # ---------------------------------------

    # 1. FRONTEND: Servimos la SPA de Vue/Vite
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        # Evita el error 404 al recargar páginas en Vue Router
        try_files $uri $uri/ /index.html; 
    }

    # 2. BACKEND API: Redirigimos al contenedor del backend de Node.js
    location /api/ {
        proxy_pass http://backend:3000; 
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        proxy_read_timeout 300s; 
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
    }
    
    # 3. WEBSOCKETS: Configuración para la conexión en tiempo real
    location /ws {  
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # Páginas de error genéricas
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}