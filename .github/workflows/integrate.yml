name: Auto Merge Integracio to Main

on:
  push:
    branches:
      - integracio

jobs:
  # --- BLOQUE 1: VALIDACIÓN (Tests) ---
  # Corremos los mismos tests que en main para asegurar que integracio es estable
  tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        working-directory: [Astro_project/backend, Astro_project/frontend/web]
    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: '${{ matrix.working-directory }}/package-lock.json'
        
    - name: Install dependencies
      working-directory: ${{ matrix.working-directory }}
      run: npm ci
      
    - name: Run Tests
      working-directory: ${{ matrix.working-directory }}
      run: |
        if [ "${{ matrix.working-directory }}" = "Astro_project/frontend/web" ]; then
          npm test
        else
          npm test
        fi

  # --- BLOQUE 2: MERGE A MAIN ---
  merge-to-main:
    needs: tests
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Git
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'

    - name: Merge integracio into main
      run: |
        git checkout main
        git pull origin main
        git merge --no-ff integracio -m "Auto-merge integracio into main after successful tests"
        git push origin main
